# Addon config + handler script for the SMSC.
#
# Mounting smpp.py via a ConfigMap means you can edit + `kubectl apply`
# it and let siphon hot-reload the handlers — no image rebuild, no
# rebind. (The kubelet propagates ConfigMap changes to the mounted file
# within ~a minute; siphon picks up the new script on the next PDU.)
apiVersion: v1
kind: ConfigMap
metadata:
  name: smsc-config
  labels:
    app: smsc
data:
  smpp.yaml: |
    server:
      bind_address: "0.0.0.0"
      port: 2775
      enquire_link_timer_ms: 30000
      inactivity_timer_ms: 300000
      max_msg_per_sec: 200        # inbound throttle, per ESME session (0 = unlimited)
      throttle_action: pace       # over-rate: pace (default) | reject (ESME_RTHROTTLED)
    binds:
      - name: alpha
        host: smsc-a.example.net
        port: 2775
        system_id: ${SMPP_ALPHA_SYSTEM_ID}
        password: ${SMPP_ALPHA_PASSWORD}
        bind_type: transceiver
        max_msg_per_sec: 50
    routing:
      default_chain: ["bind:alpha"]
  # Your handler script (see examples/gateway.py).
  smpp_script.py: |
    from siphon import smpp, log

    @smpp.on_bind
    async def authorise(bind):
        # Replace with your credential policy.
        return bind.accept()

    @smpp.on_pdu("submit_sm")
    async def on_submit(pdu, session):
        return pdu.reply(message_id="replace-me")
---
# Outbound bind secrets — reference from the Deployment via envFrom.
apiVersion: v1
kind: Secret
metadata:
  name: smsc-secrets
  labels:
    app: smsc
type: Opaque
stringData:
  SMPP_ALPHA_SYSTEM_ID: alpha_esme
  SMPP_ALPHA_PASSWORD: changeme
