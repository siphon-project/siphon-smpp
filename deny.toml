# cargo-deny — dependency-graph security / license / source policy for siphon-smpp.
# Local: `cargo deny check`  ·  CI: .github/workflows/audit.yml
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # paste — unmaintained transitive (no vuln); pulled via the pyo3 stack.
    # Remove once the parent crate drops it.
    "RUSTSEC-2024-0436",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
# siphon-smpp embeds CPython via PyO3 (links libpython); that C dependency is
# intentional, so there is no C-FFI ban list here.

[licenses]
# The crate is MIT; keep dependencies OSI-permissive.
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",             # public-domain dedication (transitive deps)
    "CDLA-Permissive-2.0", # webpki-roots cert bundle
    "BSL-1.0",             # Boost Software License (permissive, OSI)
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# siphon-sip is consumed as a git dependency until it is published to crates.io.
allow-git = ["https://github.com/siphon-project/siphon"]
