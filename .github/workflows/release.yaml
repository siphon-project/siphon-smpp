# .github/workflows/release.yaml — cut a GitHub Release on tag.
#
# siphon-smpp is a siphon *extension*, consumed from git by the composing
# binary — it is deliberately NOT published to crates.io (and the `siphon-sip`
# git dependency is permanent). A `vX.Y.Z` tag therefore just cuts a GitHub
# Release with SBOMs; there is no crate publish.
#
#   * verify-version — the git tag is the single source of truth; refuse if
#     Cargo.toml's version or the CHANGELOG section don't match.
#   * sbom           — SPDX + CycloneDX, attached to the release.
#   * github-release — notes + SBOMs.
name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cargo.toml version + CHANGELOG must match the tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "(.*)"/\1/')"
          echo "tag=$tag_version cargo=$cargo_version"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Cargo.toml version ($cargo_version) does not match tag ($tag_version)."
            exit 1
          fi
          ver_re="$(printf '%s' "$tag_version" | sed 's/\./\\./g')"
          if ! grep -qE "^## \[$ver_re\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$tag_version]' section."
            exit 1
          fi

  sbom:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-sbom
        run: cargo install cargo-sbom
      - name: Generate SPDX + CycloneDX SBOMs
        run: |
          cargo sbom --output-format spdx_json_2_3 > "siphon-smpp-${GITHUB_REF_NAME}.spdx.json"
          cargo sbom --output-format cyclone_dx_json_1_4 > "siphon-smpp-${GITHUB_REF_NAME}.cdx.json"
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: siphon-smpp-*.json

  github-release:
    needs: [verify-version, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Download SBOMs
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*.json
