# .github/workflows/release.yaml — publish to crates.io + GitHub Release on tag.
#
#   * verify-version — the git tag is the single source of truth; refuse to
#     publish if Cargo.toml's version or the CHANGELOG section don't match.
#   * crates-io      — publish via OIDC Trusted Publishing (no stored token).
#   * sbom           — SPDX + CycloneDX, attached to the release.
#   * github-release — notes + SBOMs.
#
# ⚠ PUBLISHING IS BLOCKED until `siphon-sip` is on crates.io: crates.io forbids
# git dependencies, and siphon-smpp depends on siphon-sip via a git pin. Once
# siphon-sip publishes, change that dependency to a version requirement and set
# the repo variable `PUBLISH_CRATE=true` to enable the crates-io job. Until then
# a tag still cuts a GitHub Release (+ SBOMs); the crate publish is skipped.
name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cargo.toml version + CHANGELOG must match the tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "(.*)"/\1/')"
          echo "tag=$tag_version cargo=$cargo_version"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Cargo.toml version ($cargo_version) does not match tag ($tag_version)."
            exit 1
          fi
          ver_re="$(printf '%s' "$tag_version" | sed 's/\./\\./g')"
          if ! grep -qE "^## \[$ver_re\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$tag_version]' section."
            exit 1
          fi

  crates-io:
    needs: verify-version
    # Blocked until siphon-sip is on crates.io (a git dep can't be published).
    if: vars.PUBLISH_CRATE == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint a short-lived crates.io token via GitHub OIDC
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Authenticate to crates.io (OIDC Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  sbom:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-sbom
        run: cargo install cargo-sbom
      - name: Generate SPDX + CycloneDX SBOMs
        run: |
          cargo sbom --output-format spdx_json_2_3 > "siphon-smpp-${GITHUB_REF_NAME}.spdx.json"
          cargo sbom --output-format cyclone_dx_json_1_4 > "siphon-smpp-${GITHUB_REF_NAME}.cdx.json"
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: siphon-smpp-*.json

  github-release:
    needs: [verify-version, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Download SBOMs
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*.json
