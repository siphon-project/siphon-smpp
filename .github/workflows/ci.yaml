# .github/workflows/ci.yaml — siphon-smpp CI
#
# siphon-smpp embeds CPython via PyO3 (auto-initialize), so the build needs a
# Python interpreter present. Otherwise it's a normal Rust library: format +
# lint + test on stable. Clippy runs with `-D warnings` (matching the siphon
# workspace); the lint policy lives in `clippy.toml`.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Benches compile
        run: cargo bench --no-run

      - name: Leak check
        run: cargo run --release --example leak_check

  harness-smoke:
    # The load harness is a standalone workspace (smpp34 + tokio + clap only).
    # Build it and round-trip load through real SMPP framing against its mock
    # SMSC — the end-to-end SMPP smoke test, no siphon needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build + smoke-test the load harness
        working-directory: harness
        run: COUNT=5000 WINDOW=32 ./run.sh self-test

  sdk-parity:
    # The siphon-sip SDK ships a mock of this crate's `smpp` script namespace so
    # SMPP scripts can be unit-tested and authored with type hints (see
    # docs/script-api.md → "Testing your scripts"). This job fails if that mock
    # has drifted from the runtime surface. It installs the SDK from siphon-sip
    # `main`, so it goes green once the matching siphon-sip mock change is merged.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - name: Install the siphon-sip SDK (the mock under test)
        env:
          # hatch-vcs derives the version from git tags; a shallow pip clone may
          # lack them, so pin a throwaway version for this check-only install.
          SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
        run: pip install "siphon-sip @ git+https://github.com/siphon-project/siphon-sip@main#subdirectory=sdk"
      - name: Check SDK mock parity
        run: python scripts/check_sdk_parity.py
